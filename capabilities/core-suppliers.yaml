naftiko: 1.0.0-alpha2
info:
  label: Coupa Core API — Suppliers
  description: 'Coupa Core API — Suppliers. 4 operations. Lead operation: Coupa List suppliers. Self-contained Naftiko capability
    covering one Coupa business surface.'
  tags:
  - Coupa
  - Suppliers
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    COUPA_API_KEY: COUPA_API_KEY
capability:
  consumes:
  - type: http
    namespace: core-suppliers
    baseUri: https://{instance}.coupahost.com/api
    description: Coupa Core API — Suppliers business capability. Self-contained, no shared references.
    resources:
    - name: suppliers
      path: /suppliers
      operations:
      - name: listsuppliers
        method: GET
        description: Coupa List suppliers
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: name
          in: query
          type: string
          description: Filter by supplier name
        - name: number
          in: query
          type: string
          description: Filter by supplier number
        - name: status
          in: query
          type: string
          description: Filter by supplier status (active, inactive, draft)
        - name: updated-at[gt]
          in: query
          type: string
          description: Filter for records updated after this datetime
      - name: createsupplier
        method: POST
        description: Coupa Create a supplier
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: suppliers-id
      path: /suppliers/{id}
      operations:
      - name: getsupplier
        method: GET
        description: Coupa Get a supplier
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updatesupplier
        method: PUT
        description: Coupa Update a supplier
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.COUPA_API_KEY}}'
  exposes:
  - type: rest
    namespace: core-suppliers-rest
    port: 8080
    description: REST adapter for Coupa Core API — Suppliers. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/suppliers
      name: suppliers
      description: REST surface for suppliers.
      operations:
      - method: GET
        name: listsuppliers
        description: Coupa List suppliers
        call: core-suppliers.listsuppliers
        with:
          name: rest.name
          number: rest.number
          status: rest.status
          updated-at[gt]: rest.updated-at[gt]
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createsupplier
        description: Coupa Create a supplier
        call: core-suppliers.createsupplier
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/suppliers/{id}
      name: suppliers-id
      description: REST surface for suppliers-id.
      operations:
      - method: GET
        name: getsupplier
        description: Coupa Get a supplier
        call: core-suppliers.getsupplier
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updatesupplier
        description: Coupa Update a supplier
        call: core-suppliers.updatesupplier
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: core-suppliers-mcp
    port: 9090
    transport: http
    description: MCP adapter for Coupa Core API — Suppliers. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: coupa-list-suppliers
      description: Coupa List suppliers
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: core-suppliers.listsuppliers
      with:
        name: tools.name
        number: tools.number
        status: tools.status
        updated-at[gt]: tools.updated-at[gt]
      outputParameters:
      - type: object
        mapping: $.
    - name: coupa-create-supplier
      description: Coupa Create a supplier
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: core-suppliers.createsupplier
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: coupa-get-supplier
      description: Coupa Get a supplier
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: core-suppliers.getsupplier
      outputParameters:
      - type: object
        mapping: $.
    - name: coupa-update-supplier
      description: Coupa Update a supplier
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: core-suppliers.updatesupplier
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
