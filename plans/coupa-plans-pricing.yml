specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Coupa
providerId: coupa
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - BSM
  - Business Spend Management
  - Cloud Platform
  - Enterprise
  - Financial Management
  - Invoicing
  - Procurement
  - Supply Chain
description: Coupa is an enterprise Business Spend Management (BSM) platform sold via custom contracts.
  Coupa does not publish public list prices; commercial pricing is quoted by Coupa sales based on the
  modules selected (Procurement, Invoicing, Expenses, Payments, Sourcing, Treasury, Supply Chain Design,
  Analytics), the number of users, and transaction or spend volume. The Coupa REST APIs are included
  with the platform subscription rather than priced as standalone API products.
sources:
  - https://www.coupa.com/products
  - https://compass.coupa.com/
plans:
  - id: coupa-enterprise
    name: Enterprise
    type: enterprise
    description: Coupa is sold exclusively under enterprise contracts. The contract bundles selected
      modules (Procure-to-Pay, Sourcing, Contract Lifecycle Management, Treasury, Coupa Pay, Supplier
      Management, Analytics, Supply Chain Design, etc.) with the platform APIs included. Pricing is
      typically a combination of annual subscription, user / supplier counts, and transaction volume.
    entries:
      - label: Platform subscription
        name: platform_subscription
        type: subscription
        metric: month
        limit: 1
        timeFrame: year
        geo: configurable
        unit: 1
        price: custom (contact sales)
        userMultiplied: false
      - label: Module licensing
        name: module_licensing
        type: subscription
        metric: varies
        limit: -1
        timeFrame: year
        geo: configurable
        unit: 1
        price: custom (per module)
        userMultiplied: false
      - label: Transaction / spend volume
        name: transaction_volume
        type: tiered
        metric: varies
        limit: -1
        timeFrame: year
        geo: configurable
        unit: 1
        price: custom (volume-tiered)
        userMultiplied: false
    elements:
      - name: Coupa Core API
      - name: Coupa Integration API
      - name: Coupa Supplier API
      - name: Coupa Analytics API
      - name: Coupa CCW API
      - name: Coupa CSO API
      - name: Coupa Treasury API
      - name: Coupa Open Buy API
      - name: Coupa Payments API
      - name: Coupa Procurement API
      - name: Coupa Invoicing API
      - name: Coupa Expenses API
      - name: Coupa Inventory and Receipts API
      - name: Dedicated customer success
      - name: Contractual SLA
      - name: Custom data residency
notes: Coupa does not publish public list pricing. The platform is sold exclusively under custom enterprise
  contracts that bundle modules, users, and transaction volume. Reconciled is false because no per-unit
  price is publicly verifiable; commercial pricing must be obtained from Coupa sales.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
