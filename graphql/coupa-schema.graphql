# ─────────────────────────────────────────────
# Mutation Payloads
# ─────────────────────────────────────────────

type PurchaseOrderPayload {
  purchaseOrder: PurchaseOrder
  errors: [String!]
}

type InvoicePayload {
  invoice: Invoice
  errors: [String!]
}

type RequisitionPayload {
  requisition: Requisition
  errors: [String!]
}

type ExpenseReportPayload {
  expenseReport: ExpenseReport
  errors: [String!]
}

type ContractPayload {
  contract: Contract
  errors: [String!]
}

type SupplierPayload {
  supplier: Supplier
  errors: [String!]
}

type SourcingEventPayload {
  sourcingEvent: SourcingEvent
  errors: [String!]
}

type BudgetPayload {
  budget: Budget
  errors: [String!]
}

type ApprovalPayload {
  approval: Approval
  errors: [String!]
}

type WebhookPayload {
  webhook: Webhook
  errors: [String!]
}

type DeletePayload {
  success: Boolean!
  id: ID
  errors: [String!]
}

# ─────────────────────────────────────────────
# Query Root
# ─────────────────────────────────────────────

type Query {
  # Purchase Orders
  purchaseOrder(id: ID!): PurchaseOrder
  purchaseOrders(
    filter: PurchaseOrderFilterInput
    pagination: PaginationInput
  ): PurchaseOrderConnection!

  # Invoices
  invoice(id: ID!): Invoice
  invoices(
    filter: InvoiceFilterInput
    pagination: PaginationInput
  ): InvoiceConnection!

  # Requisitions
  requisition(id: ID!): Requisition
  requisitions(
    filter: ExpenseReportFilterInput
    pagination: PaginationInput
  ): RequisitionConnection!

  # Expense Reports
  expenseReport(id: ID!): ExpenseReport
  expenseReports(
    filter: ExpenseReportFilterInput
    pagination: PaginationInput
  ): ExpenseReportConnection!

  # Contracts
  contract(id: ID!): Contract
  contracts(
    filter: ContractFilterInput
    pagination: PaginationInput
  ): ContractConnection!

  # Suppliers
  supplier(id: ID!): Supplier
  suppliers(
    filter: SupplierFilterInput
    pagination: PaginationInput
  ): SupplierConnection!

  # Sourcing Events
  sourcingEvent(id: ID!): SourcingEvent
  sourcingEvents(
    filter: SourcingEventFilterInput
    pagination: PaginationInput
  ): SourcingEventConnection!

  # Budgets
  budget(id: ID!): Budget
  budgets(pagination: PaginationInput): BudgetConnection!

  # Payments
  payment(id: ID!): Payment
  payments(supplierId: ID, invoiceId: ID, pagination: PaginationInput): [Payment!]!

  # Receiving / Inventory
  receivingTransaction(id: ID!): ReceivingTransaction
  receivingTransactions(purchaseOrderId: ID, pagination: PaginationInput): [ReceivingTransaction!]!
  inventoryAdjustment(id: ID!): InventoryAdjustment
  inventoryAdjustments(itemId: ID, pagination: PaginationInput): [InventoryAdjustment!]!
  advanceShipNotice(id: ID!): AdvanceShipNotice
  advanceShipNotices(supplierId: ID, pagination: PaginationInput): [AdvanceShipNotice!]!

  # Reference Data
  users(search: String, active: Boolean, pagination: PaginationInput): [User!]!
  user(id: ID!): User
  departments(active: Boolean): [Department!]!
  categories(parentId: ID, active: Boolean): [Category!]!
  accounts(search: String, active: Boolean): [Account!]!
  currencies(active: Boolean): [Currency!]!
  paymentTerms(active: Boolean): [PaymentTerm!]!
  taxCodes(active: Boolean): [TaxCode!]!
  expenseCategories(active: Boolean): [ExpenseCategory!]!
  items(search: String, categoryId: ID, active: Boolean, pagination: PaginationInput): [Item!]!

  # Approvals
  approvals(documentType: DocumentType, documentId: ID, status: ApprovalStatus): [Approval!]!

  # Audit
  auditLogs(
    documentType: DocumentType
    documentId: ID
    userId: ID
    fromDate: DateTime
    toDate: DateTime
    pagination: PaginationInput
  ): [AuditLog!]!

  # Webhooks
  webhooks: [Webhook!]!
  webhook(id: ID!): Webhook
}

# ─────────────────────────────────────────────
# Mutation Root
# ─────────────────────────────────────────────

type Mutation {
  # Purchase Orders
  createPurchaseOrder(input: PurchaseOrderInput!): PurchaseOrderPayload!
  updatePurchaseOrder(id: ID!, input: PurchaseOrderInput!): PurchaseOrderPayload!
  issuePurchaseOrder(id: ID!): PurchaseOrderPayload!
  cancelPurchaseOrder(id: ID!, reason: String): PurchaseOrderPayload!
  closePurchaseOrder(id: ID!): PurchaseOrderPayload!

  # Invoices
  createInvoice(input: InvoiceInput!): InvoicePayload!
  updateInvoice(id: ID!, input: InvoiceInput!): InvoicePayload!
  approveInvoice(id: ID!, notes: String): InvoicePayload!
  rejectInvoice(id: ID!, reason: String!): InvoicePayload!
  cancelInvoice(id: ID!, reason: String): InvoicePayload!
  holdInvoice(id: ID!, reason: String): InvoicePayload!

  # Requisitions
  createRequisition(input: RequisitionInput!): RequisitionPayload!
  updateRequisition(id: ID!, input: RequisitionInput!): RequisitionPayload!
  submitRequisition(id: ID!): RequisitionPayload!
  cancelRequisition(id: ID!, reason: String): RequisitionPayload!

  # Expense Reports
  createExpenseReport(input: ExpenseReportInput!): ExpenseReportPayload!
  updateExpenseReport(id: ID!, input: ExpenseReportInput!): ExpenseReportPayload!
  submitExpenseReport(id: ID!): ExpenseReportPayload!
  approveExpenseReport(id: ID!, notes: String): ExpenseReportPayload!
  rejectExpenseReport(id: ID!, reason: String!): ExpenseReportPayload!
  cancelExpenseReport(id: ID!): ExpenseReportPayload!

  # Contracts
  createContract(input: ContractInput!): ContractPayload!
  updateContract(id: ID!, input: ContractInput!): ContractPayload!
  activateContract(id: ID!): ContractPayload!
  terminateContract(id: ID!, reason: String): ContractPayload!

  # Suppliers
  createSupplier(input: SupplierInput!): SupplierPayload!
  updateSupplier(id: ID!, input: SupplierUpdateInput!): SupplierPayload!
  activateSupplier(id: ID!): SupplierPayload!
  deactivateSupplier(id: ID!, reason: String): SupplierPayload!
  inviteSupplier(id: ID!, email: String!): SupplierPayload!

  # Sourcing Events
  createSourcingEvent(input: SourcingEventInput!): SourcingEventPayload!
  updateSourcingEvent(id: ID!, input: SourcingEventInput!): SourcingEventPayload!
  publishSourcingEvent(id: ID!): SourcingEventPayload!
  closeSourcingEvent(id: ID!): SourcingEventPayload!
  awardSourcingEvent(id: ID!, supplierId: ID!, notes: String): SourcingEventPayload!
  cancelSourcingEvent(id: ID!, reason: String): SourcingEventPayload!

  # Budgets
  createBudget(input: BudgetInput!): BudgetPayload!
  updateBudget(id: ID!, input: BudgetInput!): BudgetPayload!
  activateBudget(id: ID!): BudgetPayload!
  closeBudget(id: ID!): BudgetPayload!

  # Approvals
  approveDocument(approvalId: ID!, notes: String): ApprovalPayload!
  rejectDocument(approvalId: ID!, reason: String!): ApprovalPayload!
  delegateApproval(approvalId: ID!, delegateUserId: ID!): ApprovalPayload!

  # Webhooks
  createWebhook(input: WebhookInput!): WebhookPayload!
  updateWebhook(id: ID!, input: WebhookInput!): WebhookPayload!
  deleteWebhook(id: ID!): DeletePayload!
}
