"""
Coupa GraphQL Schema
Conceptual schema derived from Coupa REST API covering business spend management:
procurement, invoicing, expense management, pay, and supply chain design.
"""

# ─────────────────────────────────────────────
# Scalars
# ─────────────────────────────────────────────

scalar DateTime
scalar Date
scalar Decimal
scalar JSON

# ─────────────────────────────────────────────
# Enums
# ─────────────────────────────────────────────

enum PurchaseOrderStatus {
  DRAFT
  PENDING_APPROVAL
  APPROVED
  ISSUED
  PARTIALLY_RECEIVED
  RECEIVED
  CLOSED
  CANCELLED
}

enum InvoiceStatus {
  DRAFT
  PENDING_RECEIPT
  PENDING_APPROVAL
  APPROVED
  PAID
  CANCELLED
  ON_HOLD
  REJECTED
}

enum RequisitionStatus {
  DRAFT
  SUBMITTED
  PENDING_APPROVAL
  APPROVED
  ORDERED
  CLOSED
  CANCELLED
}

enum ExpenseReportStatus {
  DRAFT
  SUBMITTED
  PENDING_APPROVAL
  APPROVED
  EXPORTED
  PAID
  REJECTED
  CANCELLED
}

enum ContractStatus {
  DRAFT
  PENDING_APPROVAL
  ACTIVE
  EXPIRED
  TERMINATED
  CANCELLED
}

enum SupplierStatus {
  INVITED
  PENDING_SETUP
  ACTIVE
  INACTIVE
  BLOCKED
}

enum ApprovalStatus {
  PENDING
  APPROVED
  REJECTED
  WITHDRAWN
  NOT_REQUIRED
}

enum SourcingEventStatus {
  DRAFT
  PUBLISHED
  OPEN
  CLOSED
  AWARDED
  CANCELLED
}

enum PaymentStatus {
  PENDING
  PROCESSING
  COMPLETED
  FAILED
  CANCELLED
  REFUNDED
}

enum BudgetStatus {
  DRAFT
  ACTIVE
  CLOSED
  CANCELLED
}

enum AddressType {
  BILLING
  SHIPPING
  REMIT_TO
  CORPORATE
}

enum CurrencyCode {
  USD
  EUR
  GBP
  CAD
  AUD
  JPY
  CHF
  CNY
  MXN
  BRL
  INR
  SGD
}

enum TaxType {
  STANDARD
  REDUCED
  ZERO
  EXEMPT
  REVERSE_CHARGE
}

enum InventoryAdjustmentType {
  INCREASE
  DECREASE
  TRANSFER
  WRITE_OFF
  RECEIPT
}

enum WorkerType {
  EMPLOYEE
  CONTRACTOR
  CONSULTANT
  TEMPORARY
}

enum SourcingEventType {
  RFI
  RFQ
  RFP
  AUCTION
  REVERSE_AUCTION
}

enum AccountType {
  BANK
  CREDIT_CARD
  VIRTUAL_CARD
  ACH
  WIRE
}

enum DocumentType {
  PURCHASE_ORDER
  INVOICE
  CONTRACT
  RECEIPT
  EXPENSE_REPORT
  REQUISITION
}

# ─────────────────────────────────────────────
# Core Object Types
# ─────────────────────────────────────────────

type Address {
  id: ID!
  name: String
  street1: String
  street2: String
  city: String
  state: String
  postalCode: String
  country: Country
  type: AddressType
  active: Boolean
  createdAt: DateTime
  updatedAt: DateTime
}

type Country {
  id: ID!
  code: String!
  name: String!
  active: Boolean
}

type Currency {
  id: ID!
  code: CurrencyCode!
  name: String!
  symbol: String
  exchangeRate: Decimal
  active: Boolean
}

type User {
  id: ID!
  login: String!
  email: String!
  firstName: String
  lastName: String
  fullName: String
  active: Boolean
  employeeNumber: String
  department: Department
  location: Address
  manager: User
  roles: [Role!]
  defaultAccount: Account
  createdAt: DateTime
  updatedAt: DateTime
}

type Role {
  id: ID!
  name: String!
  description: String
  permissions: [String!]
  active: Boolean
}

type Department {
  id: ID!
  name: String!
  code: String
  active: Boolean
  parent: Department
  children: [Department!]
}

type Account {
  id: ID!
  code: String!
  name: String!
  type: AccountType
  active: Boolean
  segment1: String
  segment2: String
  segment3: String
  segment4: String
  segment5: String
  description: String
}

type Supplier {
  id: ID!
  name: String!
  number: String
  status: SupplierStatus!
  primaryAddress: Address
  remitToAddress: Address
  paymentTerms: PaymentTerm
  currency: Currency
  taxId: String
  dunsNumber: String
  website: String
  email: String
  phone: String
  contacts: [SupplierContact!]
  categories: [Category!]
  certifications: [SupplierCertification!]
  diversityClassifications: [String!]
  createdAt: DateTime
  updatedAt: DateTime
}

type SupplierContact {
  id: ID!
  supplier: Supplier!
  firstName: String
  lastName: String
  email: String
  phone: String
  title: String
  primary: Boolean
  active: Boolean
}

type SupplierCertification {
  id: ID!
  supplier: Supplier!
  certificationName: String!
  certificationNumber: String
  issuer: String
  expiryDate: Date
  active: Boolean
}

type PaymentTerm {
  id: ID!
  code: String!
  description: String
  netDays: Int
  discountDays: Int
  discountPercent: Decimal
  active: Boolean
}

type Category {
  id: ID!
  name: String!
  code: String
  parent: Category
  children: [Category!]
  active: Boolean
}

type Item {
  id: ID!
  name: String!
  description: String
  itemNumber: String
  unitOfMeasure: UnitOfMeasure
  category: Category
  preferredSupplier: Supplier
  active: Boolean
  unitPrice: Decimal
  currency: Currency
}

type UnitOfMeasure {
  id: ID!
  name: String!
  code: String!
  active: Boolean
}

# ─────────────────────────────────────────────
# Procurement Types
# ─────────────────────────────────────────────

type Requisition {
  id: ID!
  requisitionNumber: String!
  status: RequisitionStatus!
  requester: User!
  submittedAt: DateTime
  neededBy: Date
  shipTo: Address
  billTo: Address
  lines: [RequisitionLine!]!
  totalAmount: Decimal
  currency: Currency
  justification: String
  approvals: [Approval!]
  purchaseOrders: [PurchaseOrder!]
  attachments: [Attachment!]
  createdAt: DateTime
  updatedAt: DateTime
}

type RequisitionLine {
  id: ID!
  requisition: Requisition!
  lineNumber: Int!
  item: Item
  description: String
  quantity: Decimal!
  unitOfMeasure: UnitOfMeasure
  unitPrice: Decimal!
  totalAmount: Decimal!
  currency: Currency
  supplier: Supplier
  account: Account
  neededBy: Date
  shipTo: Address
}

type PurchaseOrder {
  id: ID!
  orderNumber: String!
  status: PurchaseOrderStatus!
  supplier: Supplier!
  buyer: User
  orderDate: Date
  shipTo: Address
  billTo: Address
  paymentTerms: PaymentTerm
  currency: Currency
  totalAmount: Decimal
  lines: [PurchaseOrderLine!]!
  requisitions: [Requisition!]
  invoices: [Invoice!]
  receipts: [ReceivingTransaction!]
  approvals: [Approval!]
  attachments: [Attachment!]
  notes: String
  createdAt: DateTime
  updatedAt: DateTime
}

type PurchaseOrderLine {
  id: ID!
  purchaseOrder: PurchaseOrder!
  lineNumber: Int!
  item: Item
  description: String
  quantity: Decimal!
  unitOfMeasure: UnitOfMeasure
  unitPrice: Decimal!
  totalAmount: Decimal!
  currency: Currency
  account: Account
  receivedQuantity: Decimal
  invoicedQuantity: Decimal
  contract: Contract
}

type Contract {
  id: ID!
  contractNumber: String!
  name: String
  status: ContractStatus!
  supplier: Supplier!
  owner: User
  startDate: Date
  endDate: Date
  totalValue: Decimal
  currency: Currency
  description: String
  terms: String
  lines: [ContractLine!]
  attachments: [Attachment!]
  approvals: [Approval!]
  createdAt: DateTime
  updatedAt: DateTime
}

type ContractLine {
  id: ID!
  contract: Contract!
  lineNumber: Int!
  item: Item
  description: String
  unitPrice: Decimal
  unitOfMeasure: UnitOfMeasure
  quantity: Decimal
  totalAmount: Decimal
  currency: Currency
  category: Category
}

# ─────────────────────────────────────────────
# Invoicing Types
# ─────────────────────────────────────────────

type Invoice {
  id: ID!
  invoiceNumber: String!
  status: InvoiceStatus!
  supplier: Supplier!
  purchaseOrder: PurchaseOrder
  invoiceDate: Date
  dueDate: Date
  paymentTerms: PaymentTerm
  currency: Currency
  subtotal: Decimal
  taxAmount: Decimal
  totalAmount: Decimal
  lines: [InvoiceLine!]!
  payments: [Payment!]
  approvals: [Approval!]
  attachments: [Attachment!]
  notes: String
  remitToAddress: Address
  createdAt: DateTime
  updatedAt: DateTime
}

type InvoiceLine {
  id: ID!
  invoice: Invoice!
  lineNumber: Int!
  purchaseOrderLine: PurchaseOrderLine
  item: Item
  description: String
  quantity: Decimal!
  unitOfMeasure: UnitOfMeasure
  unitPrice: Decimal!
  totalAmount: Decimal!
  taxCode: TaxCode
  taxAmount: Decimal
  account: Account
}

type TaxCode {
  id: ID!
  code: String!
  description: String
  type: TaxType!
  rate: Decimal
  active: Boolean
}

# ─────────────────────────────────────────────
# Expense Types
# ─────────────────────────────────────────────

type ExpenseReport {
  id: ID!
  reportNumber: String!
  status: ExpenseReportStatus!
  submitter: User!
  title: String
  startDate: Date
  endDate: Date
  purpose: String
  totalAmount: Decimal
  currency: Currency
  lines: [ExpenseLine!]!
  approvals: [Approval!]
  payments: [Payment!]
  attachments: [Attachment!]
  createdAt: DateTime
  updatedAt: DateTime
}

type ExpenseLine {
  id: ID!
  expenseReport: ExpenseReport!
  lineNumber: Int!
  expenseDate: Date!
  expenseCategory: ExpenseCategory!
  description: String
  amount: Decimal!
  currency: Currency
  exchangeRate: Decimal
  reimbursableAmount: Decimal
  merchant: String
  receiptRequired: Boolean
  receiptAttached: Boolean
  account: Account
  perDiem: Boolean
  taxAmount: Decimal
  taxCode: TaxCode
  attachments: [Attachment!]
}

type ExpenseCategory {
  id: ID!
  name: String!
  code: String
  description: String
  requiresReceipt: Boolean
  active: Boolean
  perDiemEnabled: Boolean
}

# ─────────────────────────────────────────────
# Payment Types
# ─────────────────────────────────────────────

type Payment {
  id: ID!
  paymentNumber: String!
  status: PaymentStatus!
  paymentDate: Date
  amount: Decimal!
  currency: Currency
  paymentMethod: PaymentMethod
  supplier: Supplier
  invoice: Invoice
  expenseReport: ExpenseReport
  bankAccount: BankAccount
  reference: String
  notes: String
  createdAt: DateTime
  updatedAt: DateTime
}

type PaymentMethod {
  id: ID!
  name: String!
  code: String!
  type: AccountType!
  active: Boolean
}

type BankAccount {
  id: ID!
  accountName: String!
  accountNumber: String
  routingNumber: String
  bankName: String
  bankCode: String
  currency: Currency
  active: Boolean
  supplier: Supplier
}

# ─────────────────────────────────────────────
# Budget Types
# ─────────────────────────────────────────────

type Budget {
  id: ID!
  name: String!
  status: BudgetStatus!
  fiscalYear: Int
  startDate: Date
  endDate: Date
  totalAmount: Decimal!
  currency: Currency
  committedAmount: Decimal
  spentAmount: Decimal
  availableAmount: Decimal
  owner: User
  department: Department
  lines: [BudgetLine!]
  createdAt: DateTime
  updatedAt: DateTime
}

type BudgetLine {
  id: ID!
  budget: Budget!
  account: Account
  category: Category
  amount: Decimal!
  committedAmount: Decimal
  spentAmount: Decimal
  period: String
}

# ─────────────────────────────────────────────
# Sourcing Types
# ─────────────────────────────────────────────

type SourcingEvent {
  id: ID!
  eventNumber: String!
  name: String!
  status: SourcingEventStatus!
  type: SourcingEventType!
  owner: User
  startDate: DateTime
  endDate: DateTime
  description: String
  items: [SourcingEventItem!]
  suppliers: [SourcingEventSupplier!]
  responses: [SourcingEventResponse!]
  awards: [SourcingAward!]
  attachments: [Attachment!]
  createdAt: DateTime
  updatedAt: DateTime
}

type SourcingEventItem {
  id: ID!
  sourcingEvent: SourcingEvent!
  lineNumber: Int!
  item: Item
  description: String
  quantity: Decimal
  unitOfMeasure: UnitOfMeasure
  targetPrice: Decimal
  currency: Currency
}

type SourcingEventSupplier {
  id: ID!
  sourcingEvent: SourcingEvent!
  supplier: Supplier!
  invitedAt: DateTime
  responseStatus: String
}

type SourcingEventResponse {
  id: ID!
  sourcingEvent: SourcingEvent!
  supplier: Supplier!
  submittedAt: DateTime
  totalAmount: Decimal
  currency: Currency
  lines: [SourcingResponseLine!]
  notes: String
}

type SourcingResponseLine {
  id: ID!
  response: SourcingEventResponse!
  sourcingEventItem: SourcingEventItem!
  unitPrice: Decimal
  totalAmount: Decimal
  notes: String
  leadTimeDays: Int
}

type SourcingAward {
  id: ID!
  sourcingEvent: SourcingEvent!
  supplier: Supplier!
  awardedAt: DateTime
  totalAmount: Decimal
  currency: Currency
  notes: String
  resultingContract: Contract
}

# ─────────────────────────────────────────────
# Inventory and Receipt Types
# ─────────────────────────────────────────────

type ReceivingTransaction {
  id: ID!
  transactionNumber: String!
  purchaseOrder: PurchaseOrder!
  receivedDate: Date!
  receivedBy: User
  location: Address
  lines: [ReceivingTransactionLine!]!
  notes: String
  attachments: [Attachment!]
  createdAt: DateTime
  updatedAt: DateTime
}

type ReceivingTransactionLine {
  id: ID!
  receivingTransaction: ReceivingTransaction!
  purchaseOrderLine: PurchaseOrderLine!
  quantity: Decimal!
  unitOfMeasure: UnitOfMeasure
  notes: String
}

type InventoryAdjustment {
  id: ID!
  adjustmentNumber: String!
  type: InventoryAdjustmentType!
  item: Item!
  quantity: Decimal!
  unitOfMeasure: UnitOfMeasure
  location: Address
  adjustedBy: User
  adjustmentDate: Date
  reason: String
  notes: String
  createdAt: DateTime
  updatedAt: DateTime
}

type AdvanceShipNotice {
  id: ID!
  asnNumber: String!
  supplier: Supplier!
  purchaseOrder: PurchaseOrder
  shipDate: Date
  expectedDeliveryDate: Date
  trackingNumber: String
  carrier: String
  lines: [AdvanceShipNoticeLine!]!
  createdAt: DateTime
  updatedAt: DateTime
}

type AdvanceShipNoticeLine {
  id: ID!
  advanceShipNotice: AdvanceShipNotice!
  purchaseOrderLine: PurchaseOrderLine
  item: Item
  quantity: Decimal!
  unitOfMeasure: UnitOfMeasure
}

# ─────────────────────────────────────────────
# Approval and Workflow Types
# ─────────────────────────────────────────────

type Approval {
  id: ID!
  documentType: DocumentType!
  documentId: ID!
  status: ApprovalStatus!
  approver: User!
  requestedAt: DateTime
  respondedAt: DateTime
  notes: String
  delegatedTo: User
  sequence: Int
}

type ApprovalChain {
  id: ID!
  name: String!
  documentType: DocumentType!
  steps: [ApprovalStep!]!
  active: Boolean
}

type ApprovalStep {
  id: ID!
  chain: ApprovalChain!
  sequence: Int!
  approver: User
  role: Role
  approvalsRequired: Int
  escalationDays: Int
}

# ─────────────────────────────────────────────
# Shared / Supporting Types
# ─────────────────────────────────────────────

type Attachment {
  id: ID!
  fileName: String!
  fileSize: Int
  mimeType: String
  url: String
  uploadedBy: User
  uploadedAt: DateTime
}

type Webhook {
  id: ID!
  url: String!
  events: [String!]!
  active: Boolean!
  secret: String
  createdAt: DateTime
  updatedAt: DateTime
}

type AuditLog {
  id: ID!
  userId: User
  action: String!
  documentType: DocumentType
  documentId: ID
  timestamp: DateTime!
  changes: JSON
  ipAddress: String
}

type PageInfo {
  hasNextPage: Boolean!
  hasPreviousPage: Boolean!
  startCursor: String
  endCursor: String
  totalCount: Int
}

# ─────────────────────────────────────────────
# Connection / Paginated List Types
# ─────────────────────────────────────────────

type PurchaseOrderConnection {
  edges: [PurchaseOrderEdge!]!
  pageInfo: PageInfo!
}

type PurchaseOrderEdge {
  node: PurchaseOrder!
  cursor: String!
}

type InvoiceConnection {
  edges: [InvoiceEdge!]!
  pageInfo: PageInfo!
}

type InvoiceEdge {
  node: Invoice!
  cursor: String!
}

type SupplierConnection {
  edges: [SupplierEdge!]!
  pageInfo: PageInfo!
}

type SupplierEdge {
  node: Supplier!
  cursor: String!
}

type RequisitionConnection {
  edges: [RequisitionEdge!]!
  pageInfo: PageInfo!
}

type RequisitionEdge {
  node: Requisition!
  cursor: String!
}

type ExpenseReportConnection {
  edges: [ExpenseReportEdge!]!
  pageInfo: PageInfo!
}

type ExpenseReportEdge {
  node: ExpenseReport!
  cursor: String!
}

type ContractConnection {
  edges: [ContractEdge!]!
  pageInfo: PageInfo!
}

type ContractEdge {
  node: Contract!
  cursor: String!
}

type SourcingEventConnection {
  edges: [SourcingEventEdge!]!
  pageInfo: PageInfo!
}

type SourcingEventEdge {
  node: SourcingEvent!
  cursor: String!
}

type BudgetConnection {
  edges: [BudgetEdge!]!
  pageInfo: PageInfo!
}

type BudgetEdge {
  node: Budget!
  cursor: String!
}

