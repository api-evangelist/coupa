description: FOCUS-aligned FinOps for Coupa - enterprise SaaS sold under custom annual contracts that
  bundle module licenses, user counts, and transaction / spend volume. APIs are included in the platform
  subscription rather than priced separately. Public per-unit pricing is not disclosed.
sources:
  - https://www.coupa.com/products
  - https://compass.coupa.com/
  - https://focus.finops.org/focus-specification/v1-3/
billingModel:
  pricingCategory: Subscription (Custom)
  billingFrequency: Annual
  billingCurrency: USD/EUR/GBP
  chargeCategories:
    - Purchase
    - Tax
    - Adjustment
    - Refund
    - Credit
  chargeFrequency: Recurring
focusColumns:
  ServiceName: Coupa
  ServiceCategory: Business Spend Management
  ProviderName: Coupa
  PublisherName: Coupa Software Incorporated
  InvoiceIssuerName: Coupa Software Incorporated
  PricingCategory: Subscription
  BillingCurrency: USD
  ChargeCategory: Purchase
meters:
  - name: platform_subscription
    description: Annual Coupa platform subscription baseline
    unit: month
    aggregation: max
    dimensions:
      - module
      - region
  - name: module_licensing
    description: Per-module licensing (Procurement, Invoicing, Expenses, Pay, Sourcing, CLM, Treasury,
      Supply Chain Design, Analytics)
    unit: month
    aggregation: max
    dimensions:
      - module
      - business_unit
  - name: user_seats
    description: Named or transactional user seats included in the Coupa contract
    unit: seat
    aggregation: max
    dimensions:
      - role
      - module
      - business_unit
  - name: transaction_volume
    description: Transactional volume (POs, invoices, expense reports, payment volume) used as a sizing
      input to the Coupa contract
    unit: transaction
    aggregation: sum
    dimensions:
      - module
      - business_unit
      - region
  - name: supplier_count
    description: Active suppliers managed in Coupa, often a sizing input for the Supplier and Procurement
      modules
    unit: supplier
    aggregation: max
    dimensions:
      - business_unit
      - region
principles:
  - name: Visibility
    description: Track Coupa platform consumption (transactions, active users, supplier counts, integrations)
      via Coupa Analytics and the Integration / Audit APIs. The same telemetry is the input that drives
      the next contract renewal sizing.
  - name: Allocation
    description: Allocate Coupa cost across business units using the chart-of-accounts and cost-object
      tags applied to POs, invoices, expense reports, and contracts. Coupa's own spend-classification
      surface is the natural allocation engine.
  - name: Optimization
    description: Right-size module subscriptions against actual module usage; consolidate redundant
      integration users; use bulk loaders instead of per-record REST calls; renegotiate volume bands
      against actual transaction volume at renewal; retire low-utilization modules (Treasury, Supply
      Chain Design) when not actively in use.
  - name: Accountability
    description: Assign a Coupa application owner inside finance / procurement; review module utilization
      and integration health quarterly; tie Coupa ROI metrics (cycle-time reduction, captured savings,
      processed-spend) into FinOps reviews to justify renewal sizing.
notes: Coupa does not publish public list pricing. FOCUS columns and meters are modeled around the
  documented commercial structure (modules, seats, transactions, suppliers); reconciled is false until
  customer contract terms are referenced directly.
