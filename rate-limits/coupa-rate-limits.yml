specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Coupa
providerId: coupa
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - BSM
  - Business Spend Management
  - Cloud Platform
  - Enterprise
  - Procurement
  - Rate Limiting
  - Quotas
  - Throttling
description: Coupa enforces API rate limits per tenant on the per-instance Coupa hosts (instance.coupahost.com,
  instance.cso.coupahost.com, instance.ctm.coupahost.com), but specific per-second / per-minute numeric
  thresholds are documented in the Coupa Compass customer portal rather than on the public web. Coupa's
  documented behavior on throttling is HTTP 429 with a Retry-After header; long-running list and report
  endpoints additionally support pagination and ETag-based incremental sync to keep call rates low.
sources:
  - https://compass.coupa.com/
responseCodes:
  throttled: 429
  serviceUnavailable: 503
limits:
  - name: Per-tenant API request rate
    scope: tenant
    metric: varies
    limit: see Coupa Compass portal
    notes: Coupa publishes per-endpoint rate limits inside the authenticated Compass documentation
      portal. Public docs do not expose numeric values. Limits typically apply per Coupa instance host
      and per integration user.
policies:
  - name: Authenticated docs
    description: Detailed rate-limit numbers and bulk-API guidelines live in the Coupa Compass customer
      portal (compass.coupa.com), behind authentication. Customers should consult their Coupa integration
      docs for the exact thresholds in their contract.
  - name: Backoff Strategy
    description: On HTTP 429, honor the Retry-After header and back off with jitter. Avoid tight retry
      loops as they accelerate further throttling.
  - name: Pagination and incremental sync
    description: Use the documented pagination parameters and updated_at filters / ETags to drive incremental
      syncs rather than re-pulling full collections; this is the primary way to stay within tenant
      rate limits.
  - name: Bulk imports vs REST
    description: For large data loads, use Coupa's bulk import / loader interfaces rather than per-record
      REST calls; bulk paths have separate, higher-throughput budgets.
  - name: Integration user scoping
    description: Coupa rate limits are scoped per integration user and per Coupa host. Provision separate
      integration users per consuming system to isolate limits and audit usage.
notes: Coupa does not publish concrete per-second or per-minute API rate limits in public documentation.
  Per-tenant limits are documented inside the authenticated Coupa Compass portal. Reconciled is false
  until those numeric limits are available for transcription.
